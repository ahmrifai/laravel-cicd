name: DAST Scan

on:
  push:
    branches: [ main ]

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Laravel
        run: |
          cp .env.example .env
          composer install
          php artisan key:generate
          php artisan serve &

      - name: Wait for server
        run: sleep 10

      - name: Run OWASP ZAP
        run: |
          docker run -t owasp/zap2docker-stable zap-baseline.py \
            -t http://localhost:8000 \
            -r report.html

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.html
